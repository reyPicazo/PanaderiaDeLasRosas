<app-navbar>

  <div class="fondo d-flex justify-content-center align-items-start" style="min-height: calc(100vh - 64px);">

    <div class="w-100 px-4 pt-4">

      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="titulo-seccion">Empleados</h2>
        <button class="btn-amarillo" (click)="abrirModalCrear()">+ Nuevo Empleado</button>
      </div>

      <div class="tabla-container">
        <table class="tabla-dino w-100">
          <thead>
            <tr class="fila-header">
              <th>ID</th>
              <th>Nombre</th>

              <th></th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let empleado of empleados; let i = index"
                [class]="i % 2 === 0 ? 'fila-roja' : 'fila-blanca'">
              <td>{{ empleado.id }}</td>
              <td>{{ empleado.nombre }}</td>
              <td class="td-acciones">
                <div class="acciones-wrapper">
                  <button class="btn-puntos" (click)="toggleMenu(empleado.id, $event)">&#8942;</button>
                  <div class="menu-flotante" *ngIf="menuAbierto === empleado.id" [style.top.px]="menuPosicion.top" [style.left.px]="menuPosicion.left">
                    <button class="opcion-menu" (click)="mostrarEditar(empleado)">✏️ Editar</button>
                    <button class="opcion-menu opcion-borrar" (click)="(empleado)">🗑️ Borrar</button>
                  </div>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

    </div>

    <!-- Modal Crear/Editar Empleado -->
    <div class="overlay" *ngIf="mostrarModal">
      <div class="modal-confirm p-4 text-center">
        <h4>{{ empleadoSeleccionado ? 'Editar Empleado' : 'Nuevo Empleado' }}</h4>
        <input type="text" [(ngModel)]="nuevoEmpleado"
               [placeholder]="empleadoSeleccionado ? empleadoSeleccionado.nombre : 'Nombre del empleado'"
               class="form-control mb-2">
        <div class="d-flex gap-3 justify-content-center">
          <button class="btn btn-secondary" (click)="mostrarModal = false">Cancelar</button>
          <button class="btn-amarillo"></button>
        </div>
      </div>
    </div> 
 
  </div>
  <div class="toast-alert" [class.show]="mostrarToast">
      <div class="toast-icon">
        <i class="ti ti-ban"></i>
      </div>
      <span>{{ mensajeToast }}</span>
    </div>

</app-navbar>
