<app-navbar></app-navbar>

<div class="fondo d-flex flex-column align-items-center gap-5 p-5">

  <div *ngFor="let producto of productos" class="card p-5 text-center">
    <h2>{{ producto.producto }}</h2>
    <p>x{{ producto.cantidad }}</p>
    <button class="btn-agregar w-100 mt-4" (click)="abrirModal(producto)">Agregar</button>
  </div>

</div>

<app-modal-inventario
    [visible]="mostrarModal"
    [titulo]="productoSeleccionado?.producto"
    (onConfirmar)="procesarCantidad($event)"
    (onCerrar)="mostrarModal = false">
</app-modal-inventario>
