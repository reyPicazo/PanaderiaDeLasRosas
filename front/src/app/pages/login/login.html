<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">

<div class="fondo d-flex justify-content-center align-items-center vh-100">
    <div class="card-login p-5 text-center">
        
        <h1 class="titulo mb-0">Panaderia Las Rosas</h1>
        <div *ngIf="error" class="alert-error mb-3">{{error}}</div>

        <div class="input-dino d-flex align-items-center gap-3 mb-3">
            <span class="icono">🥯</span>
            <input type="text" class="campo" [(ngModel)]="username" placeholder="Usuario"/>
        </div>

        <button class="btn-ingresar w-100 mt-2" (click)="onLogin()">Ingresar</button>
    </div>
</div>
